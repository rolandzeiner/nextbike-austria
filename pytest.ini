[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
# Hard cap so a hung async fixture surfaces as a failure, not as a CI
# job that idles for 6 hours waiting for the runner to time it out.
timeout = 60
# Coverage gate: 90% floor. Current measurement is ~97% — bump up if you
# raise it. Coverage source is configured in pyproject.toml [tool.coverage].
addopts = --cov --cov-fail-under=90
