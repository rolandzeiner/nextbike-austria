rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not provide any service actions.
  appropriate-polling:
    status: done
  brands:
    status: done
    comment: |
      Brand assets live at custom_components/nextbike_austria/brand/:
      icon.png (256x256) and icon@2x.png (512x512), white bicycle
      silhouette on an Austrian flag red (#ED2939) rounded square.
      Austrian red rather than nextbike's trademarked brand red — keeps
      the integration identity distinct from the operator's own
      branding. HA 2026.3+ reads this folder locally (brands-proxy API);
      the home-assistant/brands repo no longer accepts custom-integration
      PRs.
  common-modules:
    status: done
  config-flow:
    status: done
  config-flow-test-coverage:
    status: done
  dependency-transparency:
    status: done
  docs-actions:
    status: exempt
    comment: No service actions.
  docs-high-level-description:
    status: done
  docs-installation-instructions:
    status: done
  docs-removal-instructions:
    status: done
  entity-event-setup:
    status: exempt
    comment: Coordinator pattern; entities don't subscribe to events directly.
  entity-unique-id:
    status: done
  has-entity-name:
    status: done
  runtime-data:
    status: done
  test-before-configure:
    status: done
  test-before-setup:
    status: done
  unique-config-entry:
    status: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No service actions.
  config-entry-unloading:
    status: done
  docs-configuration-parameters:
    status: done
  docs-installation-parameters:
    status: done
  entity-unavailable:
    status: done
    comment: CoordinatorEntity marks entities unavailable on coordinator failure.
  integration-owner:
    status: done
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator handles the once/recovery logging automatically when _async_update_data raises UpdateFailed — no custom logging needed.
  parallel-updates:
    status: done
  reauthentication-flow:
    status: exempt
    comment: Nextbike's GBFS feeds are fully unauthenticated (no API key, no login). There is no credential that could expire, so HA can never raise ConfigEntryAuthFailed against this integration.
  test-coverage:
    status: done
    comment: 97% total coverage across 32 tests. Remaining uncovered lines are defensive edge branches (selector-protected fallbacks, property getters, teardown races).

  # Gold
  devices:
    status: done
    comment: DeviceInfo on entities + explicit dr.async_get_or_create in __init__.py.
  diagnostics:
    status: done
  discovery:
    status: exempt
    comment: Cloud/HTTP integration with no local discoverable component.
  discovery-update-info:
    status: exempt
    comment: No discovery.
  docs-data-update:
    status: done
  docs-examples:
    status: done
  docs-known-limitations:
    status: done
  docs-supported-devices:
    status: exempt
    comment: Cloud API; no physical devices. Flip to `todo` for device integrations.
  docs-supported-functions:
    status: done
  docs-troubleshooting:
    status: done
  docs-use-cases:
    status: done
  dynamic-devices:
    status: exempt
    comment: Single device per config entry; no runtime device discovery.
  entity-category:
    status: exempt
    comment: All entities are primary data. Flip if you add diagnostic/config entities.
  entity-device-class:
    status: exempt
    comment: Sensor values are bike / dock counts — no matching HA SensorDeviceClass (none of ENERGY, POWER, TEMPERATURE, etc. applies). native_unit_of_measurement is set; state_class is intentionally omitted because counts are sawtooth (rentals/returns) and LTS aggregates carry no analytical signal worth keeping forever.
  entity-disabled-by-default:
    status: exempt
    comment: No non-essential entities. Flip if you add rarely-used ones.
  entity-translations:
    status: done
  exception-translations:
    status: done
  icon-translations:
    status: done
  reconfiguration-flow:
    status: done
  repair-issues:
    status: done
    comment: Coordinator has raise/clear helpers; raise real issues when degraded conditions occur.
  stale-devices:
    status: exempt
    comment: See dynamic-devices.

  # Platinum
  async-dependency:
    status: done
    comment: Only aiohttp (async) used.
  inject-websession:
    status: done
    comment: |
      async_get_clientsession(hass) in coordinator and config flow. Per the
      rule, this only applies to integrations making HTTP requests — if yours
      does not (static/local data), change status to `exempt` with a "no HTTP"
      comment instead of leaving `done`.
  strict-typing:
    status: done
    comment: py.typed marker present; CI runs mypy --strict.
